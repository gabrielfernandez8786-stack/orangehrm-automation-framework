name: OrangeHRM Automation Tests

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Clonar repositorio
      uses: actions/checkout@v4
    
    - name: Configurar JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Instalar Chrome
      run: |
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable
    
    - name: Ejecutar pruebas (permitir fallo para ver resultados)
      id: tests
      continue-on-error: true
      run: mvn clean test
      env:
        CHROME_BIN: /usr/bin/google-chrome
    
    - name: Mostrar resultados detallados (SIEMPRE)
      if: always()
      run: |
        echo "=== RESULTADOS DE PRUEBAS ==="
        if [ -d target/surefire-reports ]; then
          cat target/surefire-reports/*.txt
          cat target/surefire-reports/*.xml
        else
          echo "No se encontraron reportes en target/surefire-reports"
          find . -name "*.txt" -type f
        fi
    
    - name: Falla el workflow si los tests fallaron
      if: steps.tests.outcome == 'failure'
      run: exit 1
